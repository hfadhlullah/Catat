<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for the Icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" /> <!-- Emerald 600 -->
      <stop offset="100%" stop-color="#0d9488" /> <!-- Teal 600 -->
    </linearGradient>
    
    <!-- Accent Gradient for the Financial Trend -->
    <linearGradient id="trendGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" /> <!-- Emerald 400 -->
      <stop offset="100%" stop-color="#fbbf24" /> <!-- Amber 400 -->
    </linearGradient>
  </defs>

  <!-- ================= ICON START ================= -->
  <g transform="translate(20, 15)">
    <!-- Ledger Base / Notebook Background -->
    <rect x="10" y="10" width="90" height="110" rx="16" fill="url(#iconGrad)" />
    
    <!-- Binder Rings (Left Side) -->
    <rect x="5" y="30" width="10" height="6" rx="3" fill="#ffffff" opacity="0.8" />
    <rect x="5" y="55" width="10" height="6" rx="3" fill="#ffffff" opacity="0.8" />
    <rect x="5" y="80" width="10" height="6" rx="3" fill="#ffffff" opacity="0.8" />
    <rect x="5" y="105" width="10" height="6" rx="3" fill="#ffffff" opacity="0.8" />

    <!-- Ledger Lines (Records) -->
    <line x1="35" y1="35" x2="85" y2="35" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.4" />
    <line x1="35" y1="55" x2="75" y2="55" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.4" />
    <line x1="35" y1="75" x2="85" y2="75" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.4" />
    <line x1="35" y1="95" x2="65" y2="95" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.4" />

    <!-- Expense/Trend Chart Overlay (Rising bars indicating control/tracking) -->
    <path d="M 35,95 L 55,75 L 70,85 L 95,50" fill="none" stroke="url(#trendGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Chart Data Nodes -->
    <circle cx="95" cy="50" r="5" fill="#fbbf24" />
  </g>
  <!-- ================= ICON END ================= -->

  <!-- ================= TYPOGRAPHY ================= -->
  <!-- "Catat" Brand Name -->
  <text x="145" y="88" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="64" fill="#1e293b" letter-spacing="-1px">Catat</text>
  
  <!-- Subtitle / Tagline -->
  <text x="148" y="115" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="16" fill="#64748b" letter-spacing="3px">EXPENSE TRACKER</text>
</svg>
